name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-lint-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Setup golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          install-mode: binary

      - name: Run tests
        run: make test

      - name: Run lint
        run: make lint

      - name: Build binary
        run: make build

  docker-preflight-and-integration:
    runs-on: ubuntu-latest
    needs: test-lint-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build multi-arch image (release preflight)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          platforms: linux/amd64,linux/arm64
          provenance: false
          sbom: false

      - name: Build amd64 image for integration test
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: dtask:ci
          provenance: false
          sbom: false

      - name: Run host/compose integration smoke test
        env:
          DTASK_IMAGE: dtask:ci
        run: |
          set -euo pipefail

          rm -f /tmp/dtask-host-ok /tmp/dtask-host-user-ok /tmp/dtask-compose-ok
          compose_args=(--project-directory "$PWD" -f .github/integration/docker-compose.ci.yml)
          cleanup() {
            docker compose "${compose_args[@]}" down -v || true
            rm -f /tmp/dtask-host-ok /tmp/dtask-host-user-ok /tmp/dtask-compose-ok
          }
          trap cleanup EXIT

          docker compose "${compose_args[@]}" up -d
          sleep 8
          docker compose "${compose_args[@]}" logs dtask

          test -f /tmp/dtask-host-ok
          test -f /tmp/dtask-host-user-ok
          test -f /tmp/dtask-compose-ok

      - name: Verify clear error without /host mount
        run: |
          set -euo pipefail
          out="$(docker run --rm \
            -e host.schedule=1s \
            -e host.run=host \
            -e host.cmd=true \
            dtask:ci 2>&1 || true)"
          echo "$out"
          echo "$out" | rg "require /host mount"

      - name: Verify clear error when not root
        run: |
          set -euo pipefail
          out="$(docker run --rm \
            --user 1000:1000 \
            -v /:/host \
            -e host.schedule=1s \
            -e host.run=host \
            -e host.cmd=true \
            dtask:ci 2>&1 || true)"
          echo "$out"
          echo "$out" | rg "require root for chroot"

      - name: Verify clear error when host shell is missing
        run: |
          set -euo pipefail
          out="$(docker run --rm \
            -v /:/host \
            -e host.schedule=1s \
            -e host.run=host \
            -e 'host.shell=/definitely-not-a-shell -lc' \
            -e host.cmd=true \
            dtask:ci 2>&1 || true)"
          echo "$out"
          echo "$out" | rg 'shell "/definitely-not-a-shell" not found on host'

      - name: Verify clear error when compose label is missing
        run: |
          set -euo pipefail
          out="$(docker run --rm \
            -v /:/host \
            -e compose.schedule=1s \
            -e compose.run=compose \
            -e compose.cmd=true \
            dtask:ci 2>&1 || true)"
          echo "$out"
          echo "$out" | rg "missing docker label com.docker.compose.project.working_dir"
