name: docs

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (tag or branch) to build docs from, e.g. v0.1.0'
        required: false
        type: string
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.ref != '' && github.event.inputs.ref || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Install dependencies
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: Compute docs metadata
        id: meta
        run: |
          set -euo pipefail

          latest_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | awk 'NF{t=$0} END{print t}')"
          if [[ -z "${latest_tag:-}" ]]; then
            latest_tag="main"
          fi

          version_csv="$(python3 - <<'PY'
          import re
          import subprocess

          out = subprocess.check_output(["git", "tag", "-l"], text=True)
          tags = [t.strip() for t in out.splitlines() if re.fullmatch(r"v\d+\.\d+\.\d+", t.strip())]
          tags.sort(key=lambda s: tuple(map(int, s[1:].split("."))), reverse=True)
          print(",".join(tags))
          PY
          )"

          input_ref="${{ github.event.inputs.ref }}"
          if [[ -n "${input_ref}" ]]; then
            if [[ "${input_ref}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              current="${input_ref}"
              base="/${GITHUB_REPOSITORY#*/}/${current}/"
              kind="tag"
            else
              current="${latest_tag}"
              base="/${GITHUB_REPOSITORY#*/}/"
              kind="branch"
            fi
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            current="${GITHUB_REF_NAME}"
            base="/${GITHUB_REPOSITORY#*/}/${current}/"
            kind="tag"
          else
            current="${latest_tag}"
            base="/${GITHUB_REPOSITORY#*/}/"
            kind="branch"
          fi

          echo "latest=${latest_tag}" >> "$GITHUB_OUTPUT"
          echo "current=${current}" >> "$GITHUB_OUTPUT"
          echo "versions=${version_csv}" >> "$GITHUB_OUTPUT"
          echo "base=${base}" >> "$GITHUB_OUTPUT"
          echo "kind=${kind}" >> "$GITHUB_OUTPUT"

      - name: Build docs
        working-directory: docs
        env:
          VITEPRESS_BASE: ${{ steps.meta.outputs.base }}
          DOCS_CURRENT_VERSION: ${{ steps.meta.outputs.current }}
          DOCS_LATEST_VERSION: ${{ steps.meta.outputs.latest }}
          DOCS_VERSION_LIST: ${{ steps.meta.outputs.versions }}
        run: bun run build

      - name: Prepare deploy directory
        run: |
          set -euo pipefail
          mkdir -p .deploy

          # Preserve previously published version folders and assets.
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git archive origin/gh-pages | tar -x -C .deploy
          fi

          if [[ "${{ steps.meta.outputs.kind }}" == "tag" ]]; then
            mkdir -p ".deploy/${{ steps.meta.outputs.current }}"
            cp -a docs/.vitepress/dist/. ".deploy/${{ steps.meta.outputs.current }}/"
          fi

          if [[ "${{ steps.meta.outputs.kind }}" != "tag" || "${{ steps.meta.outputs.current }}" == "${{ steps.meta.outputs.latest }}" ]]; then
            if [[ "${{ steps.meta.outputs.kind }}" == "tag" ]]; then
              root_base="/${GITHUB_REPOSITORY#*/}/"
              VITEPRESS_BASE="${root_base}" \
              DOCS_CURRENT_VERSION="${{ steps.meta.outputs.latest }}" \
              DOCS_LATEST_VERSION="${{ steps.meta.outputs.latest }}" \
              DOCS_VERSION_LIST="${{ steps.meta.outputs.versions }}" \
              sh -c 'cd docs && bun run build'
            fi

            cp -a docs/.vitepress/dist/. .deploy/

            # Generate dynamic badge endpoints for GHCR image sizes (latest tag).
            mkdir -p .deploy/badges
            IMAGE_REPO="ghcr.io/${GITHUB_REPOSITORY_OWNER}/dtask" \
            BADGE_OUTPUT_DIR=".deploy/badges" \
            python3 scripts/generate_ghcr_size_badges.py
          fi

      - name: Deploy docs to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .deploy
          publish_branch: gh-pages
          keep_files: true
