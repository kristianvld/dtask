name: docs

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Compute docs metadata
        id: meta
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY#*/}"
          base_path="/${repo}/"

          versions=""
          if [[ -d docs/versions ]]; then
            versions="$(find docs/versions -mindepth 1 -maxdepth 1 -type d -name 'v[0-9]*.[0-9]*.[0-9]*' -exec basename {} \; | sort -Vr | tr '\n' ',' | sed 's/,$//')"
          fi

          latest=""
          if [[ -n "${versions}" ]]; then
            latest="$(echo "${versions}" | cut -d',' -f1)"
          fi

          echo "base_path=${base_path}" >> "$GITHUB_OUTPUT"
          echo "versions=${versions}" >> "$GITHUB_OUTPUT"
          echo "latest=${latest}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: Build edge docs
        working-directory: docs
        env:
          VITEPRESS_BASE: ${{ steps.meta.outputs.base_path }}edge/
          DOCS_BASE_PATH: ${{ steps.meta.outputs.base_path }}
          DOCS_VERSION_LIST: ${{ steps.meta.outputs.versions }}
          DOCS_LATEST_VERSION: ${{ steps.meta.outputs.latest }}
        run: bun run build

      - name: Build version docs
        working-directory: docs
        env:
          base_path: ${{ steps.meta.outputs.base_path }}
          versions: ${{ steps.meta.outputs.versions }}
          latest: ${{ steps.meta.outputs.latest }}
        run: |
          set -euo pipefail
          if [[ -z "${versions}" ]]; then
            echo "No version folders found"
            exit 0
          fi
          IFS=',' read -r -a ver_arr <<< "${versions}"
          for ver in "${ver_arr[@]}"; do
            [[ -z "${ver}" ]] && continue
            [[ ! -d "versions/${ver}" ]] && continue
            echo "Building versions/${ver}..."
            VITEPRESS_BASE="${base_path}${ver}/" \
            DOCS_BASE_PATH="${base_path}" \
            DOCS_VERSION_LIST="${versions}" \
            DOCS_LATEST_VERSION="${latest}" \
            bunx vitepress build "versions/${ver}"
          done

      - name: Prepare deploy directory
        run: |
          set -euo pipefail
          base_path="${{ steps.meta.outputs.base_path }}"
          versions="${{ steps.meta.outputs.versions }}"
          latest="${{ steps.meta.outputs.latest }}"

          mkdir -p .deploy

          # Root = latest release (or edge if no versions)
          if [[ -n "${latest}" ]]; then
            cp -a "docs/versions/${latest}/.vitepress/dist/." .deploy/
          else
            cp -a docs/.vitepress/dist/. .deploy/
          fi

          # Edge at /edge/
          mkdir -p .deploy/edge
          cp -a docs/.vitepress/dist/. .deploy/edge/

          # Each version at /vX.Y.Z/
          if [[ -n "${versions}" ]]; then
            IFS=',' read -r -a ver_arr <<< "${versions}"
            for ver in "${ver_arr[@]}"; do
              [[ -z "${ver}" ]] && continue
              [[ ! -d "docs/versions/${ver}/.vitepress/dist" ]] && continue
              mkdir -p ".deploy/${ver}"
              cp -a "docs/versions/${ver}/.vitepress/dist/." ".deploy/${ver}/"
            done
          fi

          # Generate dynamic badge endpoints for GHCR image sizes
          mkdir -p .deploy/badges
          IMAGE_REPO="ghcr.io/${GITHUB_REPOSITORY_OWNER}/dtask" \
          BADGE_OUTPUT_DIR=".deploy/badges" \
          python3 scripts/generate_ghcr_size_badges.py

      - name: Deploy docs to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .deploy
          publish_branch: gh-pages
          force_orphan: true
